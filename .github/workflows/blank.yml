# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "validate"
  validate:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install Python tools for syntax checking, notebook validation, and tests
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nbformat pytest

      # Check for Python syntax errors in the repository
      - name: Check Python syntax
        run: python -m compileall .

      # Validate Jupyter notebooks can be loaded
      - name: Validate Jupyter notebooks
        run: |
          python - << 'EOF'
          import pathlib
          import nbformat

          repo_root = pathlib.Path(".")
          notebooks = list(repo_root.rglob("*.ipynb"))

          if not notebooks:
              print("No Jupyter notebooks found, skipping notebook validation.")
          else:
              for nb_path in notebooks:
                  print(f"Validating notebook: {nb_path}")
                  with nb_path.open("r", encoding="utf-8") as f:
                      nbformat.read(f, as_version=4)
          EOF

      # Run tests if a tests directory is present
      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            echo "Running pytest..."
            pytest
          else
            echo "No tests directory found, skipping tests."
          fi
